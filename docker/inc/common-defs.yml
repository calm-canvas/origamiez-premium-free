x-common:
    &common
    volumes:
        - wordpress_data:/var/www/html
        - ../snapshot:/tmp/snapshot
        - ../../origamiez:/var/www/html/wp-content/themes/origamiez
        - ../config/override.ini:/usr/local/etc/php/conf.d/override.ini
    networks:
        - dev_tools
    logging:
        driver: 'json-file'
        options:
            max-size: '10m'
            max-file: '3'

x-environment:
    &common-env
    XDEBUG_CONFIG: 'client_host=host.docker.internal'
    PHP_IDE_CONFIG: 'serverName=WordPress-Docker'
    WORDPRESS_DB_HOST: ${WORDPRESS_DB_HOST}
    WORDPRESS_DB_USER: ${WORDPRESS_DB_USER}
    WORDPRESS_DB_PASSWORD: ${WORDPRESS_DB_PASSWORD}
    WORDPRESS_DB_NAME: ${WORDPRESS_DB_NAME}
    WORDPRESS_CONFIG_EXTRA: |
        define( 'DISABLE_WP_CRON', true );
        define( 'WP_DEBUG_LOG', true );
        define( 'WP_DEBUG_DISPLAY', false );
        @ini_set( 'display_errors', 0 );
        define('FS_METHOD', 'direct');
        if ( isset( $$_SERVER['HTTP_X_FORWARDED_PROTO'] ) && $$_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https' ) {
            $$_SERVER['HTTPS'] = 'on';
        }
        if (isset($$_SERVER['HTTP_HOST'])) {
            $$proto = (isset($$_SERVER['HTTP_X_FORWARDED_PROTO']) && $$_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') ? 'https' : 'http';
            define('WP_HOME', $$proto . '://' . $$_SERVER['HTTP_HOST']);
            define('WP_SITEURL', $$proto . '://' . $$_SERVER['HTTP_HOST']);
        }

services:
    common-base:
        <<: *common
        environment:
            <<: *common-env
