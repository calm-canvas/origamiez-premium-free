# Matches: sonar-scanner -Dsonar.projectKey=origamiez -Dsonar.host.url=... -Dsonar.login=...
# Token: pass via CLI (-Dsonar.login=...) or SONAR_TOKEN env var — do not commit tokens to the repo.
#
# HTTPS (https://sonarqube.localhost) with a self-signed cert often breaks the scanner with:
#   IllegalStateException: Failed to get server version
# because the JVM does not trust the CA — use HTTP on the SonarQube port (default 9000), or import the CA into the Java truststore.
# If you must use HTTPS only: override with -Dsonar.host.url=https://... and configure the JVM truststore.

sonar.projectKey=origamiez
sonar.projectName=Origamiez
sonar.host.url=http://sonarqube.localhost:9000

sonar.sourceEncoding=UTF-8

# Analysis root (defaults to the directory containing this file)
sonar.sources=.

# Excludes: dependencies, vendor, build/IDE, Docker, lockfiles, minified files, Vite-copied vendor assets
sonar.exclusions=**/node_modules/**,**/vendor/**,**/.git/**,**/.idea/**,**/.vscode/**,**/docker/**,**/.zencoder/**,**/.zenflow/**,**/coverage/**,**/reports/**,**/.scannerwork/**,**/*.min.js,**/*.min.css,**/*.min.php,**/composer.lock,**/package-lock.json,**/pnpm-lock.yaml,**/yarn.lock,origamiez/css/bootstrap.css,origamiez/css/fontawesome.css,origamiez/css/owl.carousel.css,origamiez/css/owl.theme.default.css,origamiez/css/superfish.css,origamiez/css/jquery.navgoco.css,origamiez/css/jquery.poptrox.css,origamiez/js/owl.carousel.js,origamiez/js/superfish.js,origamiez/js/jquery.navgoco.js,origamiez/js/jquery.poptrox.js

# When you have coverage reports (PHPUnit, Jest, …), you can enable:
# sonar.php.coverage.reportPaths=coverage/clover.xml
# sonar.javascript.lcov.reportPaths=coverage/lcov.info
# sonar.coverage.exclusions=**/tests/**,**/*Test.php,**/*.test.js
