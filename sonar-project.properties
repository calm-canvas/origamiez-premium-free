# Matches: sonar-scanner -Dsonar.projectKey=origamiez -Dsonar.host.url=... -Dsonar.login=...
# Token: pass via CLI (-Dsonar.login=...) or SONAR_TOKEN env var — do not commit tokens to the repo.
#
# HTTPS (https://sonarqube.localhost) with a self-signed cert often breaks the scanner with:
#   IllegalStateException: Failed to get server version
# because the JVM does not trust the CA — use HTTP on the SonarQube port (default 9000), or import the CA into the Java truststore.
# If you must use HTTPS only: override with -Dsonar.host.url=https://... and configure the JVM truststore.

sonar.projectKey=origamiez
sonar.projectName=Origamiez
sonar.host.url=http://localhost:9000

sonar.sourceEncoding=UTF-8

# sonar.exclusions alone is not enough: the scanner can still walk huge trees (origamiez/vendor, plugins/craftsman-suite/node_modules).
# List only directories that never contain vendor/node_modules, plus explicit root files under origamiez/ and the plugin bootstrap.
# origamiez/css and origamiez/js omitted: all .css/.js under origamiez/ are excluded from analysis (see sonar.exclusions).
sonar.sources=origamiez/app,origamiez/blocks,origamiez/images,origamiez/inc,origamiez/languages,origamiez/parts,origamiez/patterns,origamiez/plugins,origamiez/templates,origamiez/webfonts,origamiez/404.php,origamiez/archive.php,origamiez/comments.php,origamiez/content-none.php,origamiez/content.php,origamiez/footer.php,origamiez/functions.php,origamiez/header.php,origamiez/home.php,origamiez/index.php,origamiez/page.php,origamiez/pagination.php,origamiez/search.php,origamiez/searchform.php,origamiez/sidebar.php,origamiez/single.php,origamiez/template-page-fullwidth-centered.php,origamiez/template-page-fullwidth.php,origamiez/template-page-magazine.php,origamiez/template-page-three-cols-slm.php,origamiez/template-page-three-cols.php,origamiez/theme.json,assets,plugins/craftsman-suite/app,plugins/craftsman-suite/assets,plugins/craftsman-suite/build,plugins/craftsman-suite/craftsman-suite.php,plugins/index.php

# Excludes: all JS/CSS under origamiez/; minified/vendor assets, lockfiles, tooling paths under other roots
sonar.exclusions=origamiez/**/*.js,origamiez/**/*.css,**/node_modules/**,**/vendor/**,**/.git/**,**/.idea/**,**/.vscode/**,**/docker/**,**/.zencoder/**,**/.zenflow/**,**/coverage/**,**/reports/**,**/.scannerwork/**,**/*.min.js,**/*.min.css,**/*.min.php,**/composer.lock,**/package-lock.json,**/pnpm-lock.yaml,**/yarn.lock

# When you have coverage reports (PHPUnit, Jest, …), you can enable:
# sonar.php.coverage.reportPaths=coverage/clover.xml
# sonar.javascript.lcov.reportPaths=coverage/lcov.info
# sonar.coverage.exclusions=**/tests/**,**/*Test.php,**/*.test.js
